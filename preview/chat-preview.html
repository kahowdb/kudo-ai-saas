<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kudo AI チャット プレビュー</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 560px; margin: 24px auto; padding: 0 16px; }
    #messages { min-height: 200px; margin-bottom: 16px; }
    .message { margin: 8px 0; padding: 12px; border-radius: 8px; }
    .message.user { background: #e3f2fd; margin-left: 24px; }
    .message.ai { background: #f5f5f5; margin-right: 24px; }
    .kudo-ai-source { margin-top: 8px; padding: 10px; background: #fff8e1; border-radius: 6px; font-size: 13px; border-left: 3px solid #ffc107; }
    .kudo-ai-source strong { display: block; margin-bottom: 4px; }
    .kudo-ai-source a { text-decoration: none; font-weight: 600; }
    .kudo-ai-source a:hover { text-decoration: underline; }
    .kudo-ai-source small { color: #666; }
    #question { width: 100%; padding: 10px; margin-bottom: 8px; }
    button { padding: 10px 20px; cursor: pointer; }
    .preview-buttons { margin-bottom: 16px; }
    .preview-buttons button { margin-right: 8px; }
  </style>
</head>
<body>
  <h1>Kudo AI チャット プレビュー</h1>

  <div class="preview-buttons">
    <button type="button" id="btn-with-source">回答＋参照元ありでプレビュー</button>
    <button type="button" id="btn-no-source">回答のみでプレビュー</button>
  </div>

  <div id="messages"></div>
  <input type="text" id="question" placeholder="質問を入力（API を叩く場合）" />
  <button type="button" id="btn-ask">送信（/ask 呼び出し）</button>

  <script>
    const messages = document.getElementById("messages");

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      messages.appendChild(div);
    }

    function renderResponse(data) {
      if (data.answer) {
        addMessage(data.answer, "ai");
        if (data.sources && data.sources.length > 0) {
          const source = data.sources[0];
          const sourceBox = document.createElement("div");
          sourceBox.className = "kudo-ai-source";
          const title = (source.documentTitle || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          const preview = (source.preview || "").substring(0, 120).replace(/</g, "&lt;").replace(/>/g, "&gt;");
          const link = source.url
            ? "<a href='" + source.url.replace(/'/g, "&#39;") + "' target='_blank' rel='noopener'>📄 " + title + "</a>"
            : "📄 " + title;
          sourceBox.innerHTML =
            "<strong>参照元</strong><br>" + link + "<br>" +
            "<small>" + preview + "...</small>";
          messages.appendChild(sourceBox);
        }
      }
    }

    document.getElementById("btn-with-source").onclick = function () {
      addMessage("テスト記事の内容を教えて", "user");
      renderResponse({
        answer: "この記事は Kudo AI Sync のテスト用です。試行錯誤の内容が書かれています。",
        sources: [
          { documentId: 7464, documentTitle: "テスト記事", preview: "これはKudo AI Syncのテストです。試行錯誤ですねーー！！", url: "http://localhost:8080/?p=7464" }
        ]
      });
    };

    document.getElementById("btn-no-source").onclick = function () {
      addMessage("こんにちは", "user");
      renderResponse({ answer: "参照できるナレッジがありません。学習データを登録するか、別の質問をお試しください。" });
    };

    document.getElementById("btn-ask").onclick = async function () {
      const question = document.getElementById("question").value.trim();
      if (!question) return;
      addMessage(question, "user");
      const apiUrl = "http://localhost:8787/ask";
      try {
        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (data.ok) renderResponse(data);
        else addMessage("エラー: " + (data.error || res.status), "ai");
      } catch (e) {
        addMessage("エラー: " + e.message, "ai");
      }
    };
  </script>
</body>
</html>
